<!DOCTYPE html>
<html lang="en">
<head>
    <title>HOLY GRIL</title>
</head>
<style>
    * {
  box-sizing: border-box; 
}
body {
  display: flex;
  min-height: 100vh;
  flex-direction: column;
  margin: 0;
}
#main {
  display: flex;
  flex: 1;
}
#main > article {
  flex: 1;
}
#main > nav, 
#main > aside {
  flex: 0 0 20vw;
  background: beige;
}
#main > nav {
  order: -1;
}
header, footer {
  background: yellowgreen;
  height: 20vh;
}
header, footer, article, nav, aside {
  padding: 1em;
}
</style>
<body>
    <header>Header</header>
    <div id = "main">
        <article>
            <b>Article</b>
        </article>

        <nav>
            <i>Nav Bar</i>
        </nav>

        <aside>
            <u>Aside </u>
        </aside>
    </div>
    <footer>
        <b>
            footer
        </b>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
* {
  box-sizing: border-box; 
}
body {
  display: flex;
  min-height: 100vh;
  flex-direction: column;
  margin: 0;
}
#main {
  display: flex;
  flex: 1;
}
#main > article {
  flex: 1;
}
#main > nav, 
#main > aside {
  flex: 0 0 20vw;
  background: beige;
}
#main > nav {
  order: -1;
}
header, footer {
  background: yellowgreen;
  height: 20vh;
}
header, footer, article, nav, aside {
  padding: 1em;
}
</style>
<body>
    <header>
        Header
    </header>
    <div id ="main">
        <article>
            ARticle
            <p>
                This template uses nested flex containers so that the whole layout uses flexbox.
            </p>
        </article>
        <nav>
            navbar
        </nav>
        <aside>
            aside
        </aside>
    </div>
    <footer>
        footer
    </footer>
    
</body>
</html>
